# AP SafeCache マーケ LP（cscart/app.js）向け nginx location 例
# 本番の配置: /var/www/apps.andplus.tech/cscart（/var/www/apps.andplus.tech/wordpress と同列）
# 既存の server { ... ssl_certificate; ... } 内に取り込む。
# 編集後: nginx -t && systemctl reload nginx
#
# Node の待ち受けは本番の PORT（例: 3006）に合わせる。
# common/cscart-ap-safecache.env の PORT と一致させる。
#
# 注意: この LP はルートパス（/style.css など）前提のため、
# サブパスで公開する場合は必ず下記のように proxy_pass 末尾に / を付け、
# location のプレフィックスを削って Node には / だけ渡すこと。
# （BASE_PATH 対応は app.js 未実装のため、nginx 側で揃える）

# ---------------------------------------------------------------------------
# パターン A — サブドメイン等で「ルートが LP」（https://lp.example.com/）
# ---------------------------------------------------------------------------
# location / {
#     proxy_pass http://127.0.0.1:3006;
#     proxy_http_version 1.1;
#     proxy_set_header Host $host;
#     proxy_set_header X-Real-IP $remote_addr;
#     proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
#     proxy_set_header X-Forwarded-Proto $scheme;
#     proxy_connect_timeout 10s;
#     proxy_send_timeout 60s;
#     proxy_read_timeout 60s;
# }

# ---------------------------------------------------------------------------
# パターン B — サブパス（本番 apps.andplus.tech では /andplus-apps/ 配下が多い）
# 例: https://apps.andplus.tech/andplus-apps/cscart/
# （トークン API は /andplus-apps/cscart-ap-safecache/ 。deploy/nginx は cscart-ap-safecache 側を参照）
# ---------------------------------------------------------------------------
# location /andplus-apps/cscart/ {
#     proxy_pass http://127.0.0.1:3006/;
#     proxy_http_version 1.1;
#     proxy_set_header Host $host;
#     proxy_set_header X-Real-IP $remote_addr;
#     proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
#     proxy_set_header X-Forwarded-Proto $scheme;
#     proxy_connect_timeout 10s;
#     proxy_send_timeout 60s;
#     proxy_read_timeout 60s;
# }

# ---------------------------------------------------------------------------
# パターン C — 本番 URL が https://apps.andplus.tech/cscart/safecache/ のとき
# 403 になるのは多くの場合「静的ファイルとして /var/www/... を読もうとしている」だけ。
# 下記を server { } に入れ、PORT は .env の PORT と一致（例: 3006）。
# Node（app.js）が起動していること: systemctl status safecache-lp
#
# よくある間違い: proxy_pass を http://127.0.0.1:3007 のように「末尾 / なし」にすると、
# バックエンドには /cscart/safecache/ がそのまま渡り、Express の / と一致しない。
# 必ず http://127.0.0.1:PORT/ のように URI 部分を / で終えること。
#
# 次の X-Forwarded-Prefix で Node がサブパスを認識（HTML の CSS/JS・言語リンク用）。必須推奨。
# 環境変数 BASE_PATH は省略可（ヘッダ優先）。
# ---------------------------------------------------------------------------
# location /cscart/safecache/ {
#     proxy_pass http://127.0.0.1:3006/;
#     proxy_http_version 1.1;
#     proxy_set_header Host $host;
#     proxy_set_header X-Forwarded-Prefix /cscart/safecache;
#     proxy_set_header X-Real-IP $remote_addr;
#     proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
#     proxy_set_header X-Forwarded-Proto $scheme;
#     proxy_connect_timeout 10s;
#     proxy_send_timeout 60s;
#     proxy_read_timeout 60s;
# }
