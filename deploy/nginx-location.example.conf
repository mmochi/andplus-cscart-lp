# AP SafeCache マーケ LP（cscart/app.js）向け nginx location 例
# 本番の配置: /var/www/apps.andplus.tech/cscart（/var/www/apps.andplus.tech/wordpress と同列）
# 既存の server { ... ssl_certificate; ... } 内に取り込む。
# 編集後: nginx -t && systemctl reload nginx
#
# Node の待ち受けは本番の PORT（例: 3006）に合わせる。
# common/cscart-ap-safecache.env の PORT と一致させる。
#
# 注意: この LP はルートパス（/style.css など）前提のため、
# サブパスで公開する場合は必ず下記のように proxy_pass 末尾に / を付け、
# location のプレフィックスを削って Node には / だけ渡すこと。
# （BASE_PATH 対応は app.js 未実装のため、nginx 側で揃える）

# ---------------------------------------------------------------------------
# パターン A — サブドメイン等で「ルートが LP」（https://lp.example.com/）
# ---------------------------------------------------------------------------
# location / {
#     proxy_pass http://127.0.0.1:3006;
#     proxy_http_version 1.1;
#     proxy_set_header Host $host;
#     proxy_set_header X-Real-IP $remote_addr;
#     proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
#     proxy_set_header X-Forwarded-Proto $scheme;
#     proxy_connect_timeout 10s;
#     proxy_send_timeout 60s;
#     proxy_read_timeout 60s;
# }

